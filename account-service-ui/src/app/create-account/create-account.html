<main class="main">

  <div class="container">

    <!-- 🔥 LOGO -->
    <div class="logo">
      <h1>Greatley <span>Poshley</span></h1>
      
    </div>

    <!-- 🧾 SIGNUP CARD -->
    <div class="signup-card">

      <h2 class="title">Create Account</h2>
      <p class="subtitle">Join us in seconds</p>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

        <div class="form-grid">

          <!-- First Name -->
          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" />
          </mat-form-field>

          <!-- Last Name -->
          <mat-form-field appearance="outline">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" />
          </mat-form-field>

          <!-- Email -->
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" />
          </mat-form-field>

          <!-- Phone -->
          <mat-form-field appearance="outline">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" />
          </mat-form-field>

          <!-- Gender -->
          <mat-form-field appearance="outline">
            <mat-label>Gender</mat-label>
            <mat-select formControlName="gender">
              <mat-option value="male">Male</mat-option>
              <mat-option value="female">Female</mat-option>
              <mat-option value="other">Other</mat-option>
            </mat-select>
          </mat-form-field>

          <!-- Empty spacer (keeps grid aligned nicely) -->
          <div></div>

          <!-- Password -->
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
          </mat-form-field>

          <!-- Confirm Password -->
          <mat-form-field appearance="outline">
            <mat-label>Confirm Password</mat-label>
            <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword" />
          </mat-form-field>

        </div>

        <!-- SUBMIT -->
        <button mat-stroked-button class="gp-button" style="color:white;" type="submit">
          Create Account
        </button>

      </form>

      <div class="divider-text">Already have an account?</div>

      <button mat-stroked-button class="gp-button-light" style="color:white;" (click)="goToLogin()">
        Back to Login
      </button>

    </div>

  </div>

</main>
