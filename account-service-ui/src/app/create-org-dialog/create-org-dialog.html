<h2 mat-dialog-title style="font-weight: bold;">Create Organisation</h2>

<mat-dialog-content style="padding: 20px;">

  <!-- ERROR -->
  <p *ngIf="errorMessage" style="color:red">{{ errorMessage }}</p>

  <mat-form-field appearance="outline" style="width:100%;color: black;">
    <mat-label>Organisation Title</mat-label>
    <input matInput [(ngModel)]="organisationTitle" required>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Organisation Description</mat-label>
    <textarea matInput rows="3"
              [(ngModel)]="organisationDescription"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Email</mat-label>
    <input matInput type="email" [(ngModel)]="email">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Phone</mat-label>
    <input matInput type="tel" [(ngModel)]="phone">
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" style="color: white;width: 100px;" class="gp-button-light" [disabled]="loading">Cancel</button>

  <button mat-raised-button color="primary" type="submit" style="color: white;" class="gp-button"
          [disabled]="!organisationTitle || loading"
          (click)="save()">

    {{ loading ? 'Saving...' : 'Save' }}

  </button>
</mat-dialog-actions>
