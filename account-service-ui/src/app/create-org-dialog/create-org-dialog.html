<h2 mat-dialog-title>Create Organisation</h2>

<mat-dialog-content>

  <!-- ERROR -->
  <p *ngIf="errorMessage" style="color:red">{{ errorMessage }}</p>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Organisation Title</mat-label>
    <input matInput [(ngModel)]="organisationTitle" required>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Organisation Description</mat-label>
    <textarea matInput rows="3"
              [(ngModel)]="organisationDescription"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Email</mat-label>
    <input matInput type="email" [(ngModel)]="email">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width:100%">
    <mat-label>Phone</mat-label>
    <input matInput type="tel" [(ngModel)]="phone">
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" [disabled]="loading">Cancel</button>

  <button mat-raised-button color="primary" type="submit"
          [disabled]="!organisationTitle || loading"
          (click)="save()">

    {{ loading ? 'Saving...' : 'Save' }}

  </button>
</mat-dialog-actions>
