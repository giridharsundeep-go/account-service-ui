<main class="profile-page">

    <!-- 🔝 TOP BAR -->
    <mat-toolbar class="toolbar">
        <span style="color: black;font-weight: bold;font-size: 20px;">Greatley Poshley</span>
        <span class="spacer"></span>

        <button mat-icon-button>
            <mat-icon>settings</mat-icon>
        </button>
    </mat-toolbar>

    <section class="main-layout">

        <!-- 🔥 STYLISH SIDE PANEL -->
        <aside class="side-panel" style="padding-top: 40px;">

            <!-- USER MINI -->
            <div class="side-user">
                <div class="mini-avatar">
                    {{ user.name?.charAt(0) }}
                </div>
                <div>
                    <div class="mini-name">{{ user.name }}</div>
                    <div class="mini-email">{{ user.email }}</div>
                </div>
            </div>

            <!-- APPLICATIONS -->
            <div class="side-section">
                <p class="side-title">Applications</p>

               <div class="side-item"
     [class.active]="activeMenu==='create'"
     (click)="setActive('create')">
  <mat-icon>add_business</mat-icon>
  <span>Create Org</span>
</div>

<div class="side-item"
     [class.active]="activeMenu==='dashboard'"
     (click)="setActive('dashboard')">
  <mat-icon>dashboard</mat-icon>
  <span>Dashboard</span>
</div>

<div class="side-item"
     [class.active]="activeMenu==='roles'"
     (click)="setActive('roles')">
  <mat-icon>badge</mat-icon>
  <span>Roles</span>
</div>

<div class="side-item"
     [class.active]="activeMenu==='users'"
     (click)="setActive('users')">
  <mat-icon>person</mat-icon>
  <span>Users</span>
</div>

<div class="side-item"
     [class.active]="activeMenu==='teams'"
     (click)="setActive('teams')">
  <mat-icon>groups</mat-icon>
  <span>Teams</span>
</div>

<div class="side-item"
     [class.active]="activeMenu==='projects'"
     (click)="setActive('projects')">
  <mat-icon>folder</mat-icon>
  <span>Projects</span>
</div>
            </div>

        </aside>

        <!-- ✅ MAIN CONTENT -->
        <div class="content-area">

           <div class="content-area">

  <!-- CREATE ORG -->
  <app-organisation *ngIf="activeMenu === 'create'"></app-organisation>
  <app-dashboard *ngIf="activeMenu === 'dashboard'"></app-dashboard>
  <app-roles *ngIf="activeMenu === 'roles'"></app-roles>
  <app-users *ngIf="activeMenu === 'users'"></app-users>
  <app-teams *ngIf="activeMenu === 'teams'"></app-teams>
  <app-projects *ngIf="activeMenu === 'projects'"></app-projects>

</div>

        </div>

    </section>

</main>
